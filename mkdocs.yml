extra_css:
  - https://fonts.googleapis.com/css?family=Noto+Sans:400,700&display=swap
  # - stylesheets/custom.css
  - stylesheets/extra.css
  - stylesheets/floating_action_button.css
  # - https://cdn.jsdelivr.net/npm/@fontsource/noto-sans

plugins:
  - markmap:
      d3_version: ""
      lib_version: ""
      view_version: ""
      base_path: docs
      # encoding: utf-8
      # file_extension: .mm.md
      # d3_version: '3.6.0'
      # lib_version: 0.15.3
      # view_version: 0.15.3
  # - meta
        # enabled: true 
  - tags
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - blog:
      enabled: true
      blog_dir: blog
      blog_toc: true
      post_dir: "{blog}/posts"
      post_date_format: full
      post_url_date_format: yyyy//MM/dd
      post_url_format: "{date}/{slug}"
      post_url_max_categories: 10
      post_slugify_separator: "-"
      post_excerpt_max_authors: 1
      post_excerpt_max_categories: 5
      post_excerpt_separator: <!-- more -->
      post_readtime: true
      post_readtime_words_per_minute: 265
      archive: true
      archive_name: Archive
      archive_toc: true
      categories: true
      categories_name: Categories
      categories_slugify_separator: "-"
      categories_toc: true
      categories_url_format: "category/{slug}"
      categories_allowed:
        - Algorithmic frolic
        - Chase the database
        - CPP to see sharply
        - Giáo dục dầm dề truyện
        - Improvised & Inspired
        - Moron in Python
        - Solve to surpass
        - Set up & Code down
        - Work wild web
      #   - Performance
      #   - Blog
      pagination: true
      pagination_per_page: 10
      pagination_keep_content: true
      pagination_url_format: "page/{page}"
      authors: true
      authors_file: "{blog}/.authors.yml"
      draft: false
      draft_on_serve: true
      draft_if_future_date: false
  # - rss:
  #     enabled: true
  #     match_path: blog/posts/.* 
  #     date_from_meta:
  #       as_creation: date
  #     categories:
  #       - categories
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: false
      draggable: true
      skip_classes:
        - custom-skip-class-name
      auto_caption: true
      caption_position: bottom
      background: #74b9ff
      shadow: true
      manual: false  
  - i18n:
      # default_language: vi # current default language
      docs_structure: suffix
      languages:
        - locale: vi
          name: Tiếng Việt
          build: true
          default: true
        - locale: en
          name: English
          build: true
      # nav_translations:
      #   en:
      #     "Lớp 11": "Grade 11"

      #   vi:
      #     name: Tiếng Việt # Display name for the Vietnamese language
      #     build: true
      #   en:
      #     name: English # Display name for the English language
      #     build: true
      # material_alternate: true # Enables the Material for MkDocs language selector

