# Project information
site_name: Mr School's docs for Tin học GDPT 2018
site_url: https://docs.mrschool.vn
site_author: Mr School
site_description: >-
  Giúp bạn nắm bắt kiến thức của môn Tin học cấp trung học phổ thông. Tiếp thu dễ dàng. Tra cứu thuận tiện. Vượt qua kỳ thi Tốt nghiệp THPT và những kỳ thi khác. Xem được ở mọi nơi có internet, trên nhiều loại máy, bất kể tư thế.

# Repository
repo_name: GitHub để chữa lành
repo_url: https://github.com/vtchitruong/vtchitruong.github.io

